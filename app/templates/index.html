<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabi(旅)Time | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-white font-sans">

    <div class="container mx-auto px-6 py-12">
        <header class="mb-12 text-center">
            <h1 class="text-5xl font-bold mb-2">Tabi(旅)Time</h1>
            <p class="text-slate-400 tracking-widest uppercase">Your Personal Nihon Travel Nexus & Dashboard</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            
            <a href="/journal" class="group bg-slate-800 p-8 rounded-3xl border border-slate-700 hover:border-blue-500 transition-all duration-300 transform hover:-translate-y-2">
                <div class="flex items-center justify-between mb-4">
                    <div class="bg-blue-500/20 p-4 rounded-2xl">
                        <i class="fa-solid fa-map-location-dot text-blue-500 text-2xl"></i>
                    </div>
                    <span class="text-xs font-mono text-slate-500">v1.0</span>
                </div>
                <h2 class="text-2xl font-semibold mb-2">Travel Journal</h2>
                <p class="text-slate-400 text-sm">Interactive GPS map tracking your journey across Japan.</p>
            </a>

            <div class="bg-slate-800/50 p-8 rounded-3xl border border-slate-700 opacity-60 cursor-not-allowed">
                <div class="flex items-center justify-between mb-4">
                    <div class="bg-orange-500/20 p-4 rounded-2xl">
                        <i class="fa-solid fa-language text-orange-500 text-2xl"></i>
                    </div>
                </div>
                <h2 class="text-2xl font-semibold mb-2">Language Helper</h2>
                <p class="text-slate-400 text-sm">Coming Soon: Flashcards and essential phrases.</p>
            </div>

            <div class="bg-slate-800/50 p-8 rounded-3xl border border-slate-700 opacity-60 cursor-not-allowed">
                <div class="flex items-center justify-between mb-4">
                    <div class="bg-green-500/20 p-4 rounded-2xl">
                        <i class="fa-solid fa-yen-sign text-green-500 text-2xl"></i>
                    </div>
                </div>
                <h2 class="text-2xl font-semibold mb-2">Currency Converter</h2>
                <p class="text-slate-400 text-sm">Coming Soon: Real-time USD to JPY tracking.</p>
            </div>

        </div>
    </div>
</body>
</html>
