<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅Time | Travel Journal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        /* Custom Leaflet Dark Mode Overrides */
        .leaflet-popup-content-wrapper { background: #1e293b !important; color: white !important; border-radius: 1rem; border: 1px solid #334155; }
        .leaflet-popup-tip { background: #1e293b !important; }
        .leaflet-container { background: #0f172a !important; }
        #map { height: calc(100vh - 160px); width: 100%; }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans p-6">

    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-4">
                <a href="/" class="bg-slate-800 hover:bg-slate-700 p-3 rounded-2xl border border-slate-700 transition">
                    <i class="fa-solid fa-house text-blue-400"></i>
                </a>
                <div>
                    <h1 class="text-3xl font-bold tracking-tight">Travel Journal</h1>
                    <p class="text-slate-400 text-xs uppercase tracking-widest">Interactive GPS map tracking your journey across Japan</p>
                </div>
            </div>
            <div class="hidden md:block text-right">
                <span class="text-xs font-mono text-slate-500">v1.0</span>
            </div>
        </header>

        <div class="relative group">
            <div id="map" class="rounded-[1rem] border border-slate-700 shadow-2xl overflow-hidden"></div>
            
            <div class="absolute bottom-6 left-6 z-[1000] bg-slate-900/80 backdrop-blur-md p-4 rounded-2xl border border-slate-700 pointer-events-none">
                <div class="flex items-center gap-3">
                    <div class="w-3 h-3 rounded-full bg-blue-500 animate-pulse"></div>
                    <p class="text-xs font-medium text-slate-300">Live Route Path</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. Define Map Styles
        const darkMatter = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { 
            attribution: '&copy; CartoDB' 
        });
        const stamenTerrain = L.tileLayer('https://tiles.stadiamaps.com/tiles/stamen_terrain/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.stadiamaps.com/" target="_blank">Stadia Maps</a> &copy; <a href="https://www.stamen.com/" target="_blank">Stamen Design</a> &copy; <a href="https://openmaptiles.org/" target="_blank">OpenMapTiles</a> &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        });
        const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { 
            attribution: '&copy; Esri' 
        });

        // 2. Initialize Map
        const map = L.map('map', {
            center: [36.2048, 138.2529],
            zoom: 6,
            layers: [stamenTerrain]
        });

        const baseMaps = {
            "<span class='text-slate-900 font-sans'>Mountain Terrain</span>": stamenTerrain,
            "<span class='text-slate-900'>Dark Mode</span>": darkMatter,
            "<span class='text-slate-900'>Satellite</span>": satellite
        };

        L.control.layers(baseMaps).addTo(map);

        // 3. Fetch Points
        fetch('/api/points')
            .then(res => res.json())
            .then(points => {
                if (points.length === 0) return;

                const coords = points.map(p => [p.lat, p.lon]);
                
                // Draw Dashed Path
                const path = L.polyline(coords, {
                    color: '#3b82f6',
                    weight: 3,
                    opacity: 0.8,
                    dashArray: '8, 12'
                }).addTo(map);

                // Add Markers
                points.forEach((p, index) => {
                    const marker = L.circleMarker([p.lat, p.lon], {
                        radius: 8,
                        fillColor: "#3b82f6",
                        color: "#fff",
                        weight: 2,
                        opacity: 1,
                        fillOpacity: 1
                    }).addTo(map);

                    // Tailwind-styled Popup Content
                    const popupContent = `
                        <div class="w-48 p-0">
                            <img src="/static/photos/${p.img}" 
                                class="rounded-md mb-2 w-full h-32 object-cover shadow-sm" 
                                alt="Travel Photo">
                            <div class="flex justify-between items-center px-0.5">
                                <span class="text-[9px] font-bold text-blue-400 uppercase tracking-tighter">Stop ${index + 1}</span>
                                <span class="text-[9px] font-mono text-slate-400">${p.lat.toFixed(2)}, ${p.lon.toFixed(2)}</span>
                            </div>
                        </div>
                    `;

                    marker.bindPopup(popupContent, {
                        maxWidth: 240,
                        minWidth: 240,
                        offset: [0, -5]
                    });
                });

                map.fitBounds(path.getBounds(), { padding: [80, 80] });
            });
    </script>
</body>
</html>
