<!DOCTYPE html>
<html>
<head>
    <title>旅Time - Travel Journal</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 600px; width: 100%; border-radius: 15px; }
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
    </style>
</head>
<body>
    <h1>Travel Journey</h1>
    <div id="map"></div>

    <script>
        // 1. Initialize the map centered on Japan
        var map = L.map('map').setView([36.2048, 138.2529], 5);

        // 2. Add Dark Mode Map Tiles (CartoDB Dark Matter)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // 3. Fetch the points via Flask (points.json)
        fetch('/api/points')
            .then(res => res.json())
            .then(data => {
                var coords = data.map(p => [p.lat, p.lon]);

                // 4. Draw the Blue Line (The Path)
                var polyline = L.polyline(coords, {color: '#3b82f6', weight: 4}).addTo(map);

                // 5. Add Markers for each photo
                data.forEach(p => {
                    L.marker([p.lat, p.lon]).addTo(map)
                        .bindPopup(`<img src="/static/photos/${p.img}" width="150px"><br>Location Point`);
                });

                // Zoom the map to fit the path
                map.fitBounds(polyline.getBounds());
            });
    </script>
</body>
</html>
