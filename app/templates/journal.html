<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tabi(旅)Time | Travel Journal</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
        />
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/journal.css') }}" />
    </head>
    <body class="bg-slate-900 text-white font-sans p-6">
        <div class="max-w-7xl mx-auto">
            <header class="flex justify-between items-center mb-8">
                <div class="flex items-center gap-4">
                    <a
                        href="/"
                        class="bg-slate-800 hover:bg-slate-700 p-3 rounded-2xl border border-slate-700 transition"
                    >
                        <i class="fa-solid fa-house text-blue-400"></i>
                    </a>
                    <div>
                        <h1 class="text-3xl font-bold tracking-tight">Travel Journal</h1>
                        <p class="text-slate-400 text-xs uppercase tracking-widest">
                            Interactive GPS map tracking your journey across Japan
                        </p>
                    </div>
                </div>
                <div class="hidden md:block text-right">
                    <span class="text-xs font-mono text-slate-500">v1.0</span>
                </div>
            </header>

            <div id="day-filter" class="flex gap-3 mb-6 overflow-x-auto pb-2 scrollbar-hide">
                <button
                    onclick="filterByDay('all', this)"
                    class="day-btn active px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest"
                >
                    All Dates
                </button>
            </div>

            <div class="relative group">
                <div
                    id="map"
                    class="rounded-[1rem] border border-slate-700 shadow-2xl overflow-hidden"
                ></div>

                <div
                    class="absolute bottom-6 left-6 z-[1000] bg-slate-900/80 backdrop-blur-md p-4 rounded-2xl border border-slate-700 pointer-events-none"
                >
                    <div class="flex items-center gap-3">
                        <div class="w-3 h-3 rounded-full bg-blue-500 animate-pulse"></div>
                        <p class="text-xs font-medium text-slate-300">Live Route Path</p>
                    </div>
                </div>
            </div>
        </div>

        <script src="{{ url_for('static', filename='js/journal.js') }}"></script>
    </body>
</html>
